# docker-compose.yml — inferia-worker
#
# On a GPU host with Docker + NVIDIA Container Toolkit installed:
#   cp .env.sample .env
#   # fill in CONTROL_PLANE_URL, BOOTSTRAP_TOKEN, POOL_ID, NODE_NAME,
#   # WORKER_ADVERTISE_URL, INFERENCE_TOKEN
#   docker compose up -d
#
# That's it. The worker will register with InferiaLLM, exchange the
# bootstrap token for a long-lived JWT (persisted in the worker-state
# volume), and start heartbeating + accepting model load commands.

services:
  # mooncake-master — shared KV-cache coordination service.
  # The gRPC master + embedded HTTP metadata server run in a single container.
  # vLLM model containers resolve it via the inferia-models bridge network.
  mooncake-master:
    image: ghcr.io/inferiaai/mooncake-master:latest
    container_name: mooncake-master
    restart: unless-stopped
    volumes:
      - mooncake-config:/config
    environment:
      MOONCAKE_RPC_PORT:    "${MOONCAKE_RPC_PORT:-50063}"
      MOONCAKE_HTTP_PORT:   "${MOONCAKE_HTTP_PORT:-8092}"
      MOONCAKE_METRICS_PORT: "${MOONCAKE_METRICS_PORT:-9003}"
      LOCAL_BUFFER_BYTES:   "${MOONCAKE_LOCAL_BUFFER_BYTES:-2147483648}"
    networks:
      - default
      - inferia-models
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/metadata').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  worker:
    image: ${INFERIA_WORKER_IMAGE:-ghcr.io/inferiaai/inferia-worker:latest}
    container_name: inferia-worker
    restart: unless-stopped
    depends_on:
      mooncake-master:
        condition: service_healthy

    # Required: env vars the worker reads at startup.
    environment:
      CONTROL_PLANE_URL:        ${CONTROL_PLANE_URL}
      BOOTSTRAP_TOKEN:          ${BOOTSTRAP_TOKEN}
      NODE_NAME:                ${NODE_NAME}
      POOL_ID:                  ${POOL_ID}
      WORKER_ADVERTISE_URL:     ${WORKER_ADVERTISE_URL}
      INFERENCE_TOKEN:          ${INFERENCE_TOKEN}
      WORKER_LISTEN_ADDR:       ${WORKER_LISTEN_ADDR:-0.0.0.0:8080}
      LOG_LEVEL:                ${LOG_LEVEL:-info}
      PULL_TIMEOUT_SECONDS:     ${PULL_TIMEOUT_SECONDS:-600}
      READINESS_TIMEOUT_SECONDS: ${READINESS_TIMEOUT_SECONDS:-180}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-5}
      MODELS_NETWORK:           ${MODELS_NETWORK:-inferia-models}
      MOONCAKE_KV_ENABLED:     ${MOONCAKE_KV_ENABLED:-false}
      # Escape hatches for hosts where automatic GPU detection misfires.
      # The worker first tries `nvidia-smi`, then falls back to counting
      # /dev/nvidia[0-9]+ files mounted by the NVIDIA container runtime.
      # Set ALLOCATABLE_GPU_OVERRIDE to force the advertised GPU count
      # (useful when only a subset of the host's GPUs is passed through),
      # and ALLOCATABLE_GPU_MODELS_OVERRIDE to a pipe-joined model list
      # (e.g. "NVIDIA A100|NVIDIA A100") when the fallback can't recover
      # the real model name. Unset by default → use detection.
      ALLOCATABLE_GPU_OVERRIDE:        ${ALLOCATABLE_GPU_OVERRIDE:-}
      ALLOCATABLE_GPU_MODELS_OVERRIDE: ${ALLOCATABLE_GPU_MODELS_OVERRIDE:-}

    # Required volumes:
    #   - /var/run/docker.sock : the worker launches sibling containers on the host.
    #   - worker-state         : persists the worker JWT across restarts.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - worker-state:/var/lib/inferia-worker

    # Inference port exposed to the local network. The control plane reaches
    # the worker at WORKER_ADVERTISE_URL which must terminate here.
    ports:
      - "${INFERENCE_PORT:-8080}:8080"

    # No healthcheck in compose: the distroless image has no wget/curl, and
    # the worker's /healthz is intended for external operator monitoring (the
    # control plane already knows liveness from heartbeats). Operators who
    # want a local-host probe can add their own using a sibling container.

    # GPU access for the worker itself. The worker never runs CUDA, but the
    # /dev/nvidia[0-9]+ devices the NVIDIA container runtime mounts here are
    # how the worker's telemetry counts GPUs in the distroless image (which
    # ships without nvidia-smi). Without this block the worker advertises
    # gpu=0 and the control plane's placement filter rejects every GPU
    # deployment with a confusing "Worker pools self-provision" error.
    #
    # Operators who do NOT want this host to serve GPU workloads can
    # comment this out and the worker stays CPU-only.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Attach to the InferiaLLM control-plane network when present so the
    # worker can resolve the control plane's container hostname (e.g.
    # inferia-app). Operators using a different network can override
    # WORKER_NETWORK or remove this block.
    # Also attached to inferia-models so the worker can resolve model containers
    # by name during readiness probes (the worker self-attaches to this network
    # at startup, so this is belt-and-suspenders).
    networks:
      - default
      - inferia-cp
      - inferia-models

volumes:
  worker-state:
    driver: local
  mooncake-config:
    driver: local

networks:
  inferia-cp:
    name: ${WORKER_NETWORK:-deploy_inferia-net}
    external: true
  inferia-models:
    name: inferia-models
    driver: bridge
